name: Contracts

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "tests/**"
      - "Clarinet.toml"
      - "package.json"
  pull_request:
    paths:
      - "contracts/**"
      - "tests/**"
      - "Clarinet.toml"
      - "package.json"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm test
